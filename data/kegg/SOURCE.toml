notes = """
KEGG REST terms restrict bulk automated pulls. The fetcher is intentionally
gated and does not run in CI. Public release artefacts of gapsmith-db do not
include KEGG-derived content. If you hold a KEGG academic licence and wish to
include KEGG data locally:

1. Populate data/kegg/ manually with the artefacts your licence covers.
2. Record the pin + sha256 in this file.
3. Run the ingest step (not fetch); the ingest pipeline will treat manually-
   populated data as if it had been fetched via the normal path.

See LICENSING.md for policy reasoning on restrictively-licensed sources.

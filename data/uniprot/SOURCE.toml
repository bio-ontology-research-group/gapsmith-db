name = "UniProtKB/Swiss-Prot"
upstream_url = "https://www.uniprot.org/"
rest_url = "https://rest.uniprot.org/uniprotkb/"
licence = "Creative Commons Attribution 4.0 International (CC-BY-4.0)"
licence_url = "https://www.uniprot.org/help/license"
attribution = "The UniProt Consortium. UniProt: the Universal Protein Knowledgebase in 2023. Nucleic Acids Res. 51(D1):D523-D531 (CC-BY-4.0)"

# Pin policy: UniProt release tag (bimonthly). Verify via
#   curl https://ftp.uniprot.org/pub/databases/uniprot/relnotes.txt
pinned_release = "2026_01"
pinned_date = "2026-01-28"
sha256 = ""

# REST query for the EC-annotated Swiss-Prot subset. Concatenated into one
# JSON file (swissprot_ec.json) across cursor pages.
query = "reviewed:true AND (ec:*)"
artefacts = [
    "swissprot_ec.json",
]

[file_hashes]
"swissprot_ec.json" = "89af7550d83eba1f65f838a23e289b2d7ac86239f3bec73c39469e6396487e4c"

notes = """
Swiss-Prot EC-annotated reviewed subset. Drives the UniProtExistence verifier.
Stored as a single concatenated JSON (no shards); pagination is a fetch-time
implementation detail.
"""
